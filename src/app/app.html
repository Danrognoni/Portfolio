<div [class.animate-shake]="konamiActivated" class="min-h-screen">
  <div class="relative">
    <app-navbar></app-navbar>
    <app-hero></app-hero>
    <app-about></app-about>
    <app-services></app-services>
    <app-portfolio></app-portfolio>
    <app-work></app-work>
    <app-blog></app-blog>
    <app-contact></app-contact>
    <app-footer></app-footer>
  </div>
  <router-outlet></router-outlet>
</div>

<div *ngIf="konamiActivated" 
     class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm pointer-events-none">
  
  <div class="absolute inset-0 bg-primary/20 animate-pulse"></div>

  <div class="relative z-10 animate-fade-in-up">
    <img src="assets/img/Cat_Working_GIF.gif" 
         [alt]="'EASTER_EGG.ALT_CAT' | translate" 
         class="w-80 h-80 md:w-100 md:h-100 object-contain drop-shadow-[0_0_30px_rgba(249,231,28,0.5)]">
  </div>

  <div class="mt-8 text-center animate-bounce">
    <h2 class="text-yellow font-bold text-4xl md:text-6xl uppercase tracking-tighter">
      {{ 'EASTER_EGG.TITLE' | translate }}
    </h2>
    <p class="text-white text-xl md:text-2xl mt-2 font-body">
      {{ 'EASTER_EGG.SUBTITLE' | translate }}
    </p>
  </div>
</div>
