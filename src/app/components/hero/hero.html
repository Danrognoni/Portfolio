<div class="relative py-8 bg-mesh-animated overflow-hidden">
  
  <div class="absolute top-20 left-1/4 w-72 h-72 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-60 animate-blob z-10"></div>
  <div class="absolute top-40 right-1/4 w-72 h-72 bg-yellow rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob z-10" style="animation-delay: 2s;"></div>
  <div class="absolute -bottom-8 left-1/2 w-72 h-72 bg-white rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob z-10" style="animation-delay: 4s;"></div>

  <div class="absolute inset-0 z-20 bg-black/40"></div>

  <ngx-particles 
    [id]="id" 
    [options]="particlesOptions" 
    [particlesInit]="particlesInit"
    class="absolute inset-0 z-25">
  </ngx-particles>

  <div class="container relative z-30 pt-20 pb-12 sm:pt-56 sm:pb-48 lg:pt-64 lg:pb-48">
    <div class="flex flex-col items-center justify-center lg:flex-row">
      
      <div class="rounded-full border-8 border-primary shadow-xl overflow-hidden animate-float">
        <img src="assets/img/dante.jpg" class="h-48 w-48 object-cover sm:h-56 sm:w-56" alt="Dante Rognoni" />
      </div>

      <div class="pt-8 sm:pt-10 lg:pl-8 lg:pt-0 animate-fade-in-up">
        <h1 class="text-center font-header text-4xl font-bold sm:text-left sm:text-5xl md:text-6xl animate-text-gradient bg-gradient-to-r from-white via-yellow to-primary bg-[length:200%_auto] text-transparent bg-clip-text">
          {{ 'HERO.GREETING' | translate }}
        </h1>

        <div class="flex items-center justify-center pt-3 sm:justify-start">
          <ngx-typed-js
            [strings]="[
              'HERO.TYPING_1' | translate, 
              'HERO.TYPING_2' | translate, 
              'HERO.TYPING_3' | translate
            ]"
            [typeSpeed]="60" [backSpeed]="40" [backDelay]="1500" [loop]="true">
            <p class="font-body text-2xl uppercase text-yellow font-bold sm:text-3xl">
              {{ 'HERO.IM' | translate }} <span class="typing ml-2"></span>
            </p>
          </ngx-typed-js>
        </div>

        <div class="flex flex-col justify-center pt-5 sm:flex-row sm:pt-8 lg:justify-start">
          <div class="flex items-center justify-center pl-0 sm:justify-start md:pl-1">
            <p class="font-body text-lg uppercase text-white">{{ 'HERO.CONNECT' | translate }}</p>
            <div class="hidden sm:block"><i class="bx bx-chevron-right text-3xl text-yellow"></i></div>
          </div>
          <div class="flex items-center justify-center pt-5 pl-2 sm:justify-start sm:pt-0">
            <a href="https://github.com/Danrognoni" target="_blank" class="pl-4 transition-transform hover:scale-125">
              <i class="bx bxl-github text-3xl text-white hover:text-yellow"></i>
            </a>
            <a href="https://www.linkedin.com/in/danrognonii/" target="_blank" class="pl-4 transition-transform hover:scale-125">
              <i class="bx bxl-linkedin text-3xl text-white hover:text-yellow"></i>
            </a>
            <a href="https://www.instagram.com/danrognonii/?hl=es" target="_blank" class="pl-4 transition-transform hover:scale-125">
              <i class="bx bxl-instagram text-3xl text-white hover:text-yellow"></i>
            </a>
            <a href="mailto:danrognoni@outlook.es" class="pl-4 transition-transform hover:scale-125">
              <i class="bx bx-envelope text-3xl text-white hover:text-yellow"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
