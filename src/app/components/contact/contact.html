<div class="relative overflow-hidden bg-mesh-animated py-16 md:py-20" id="contact">
  
  <div class="absolute top-0 -left-4 w-72 h-72 bg-primary opacity-20 filter blur-3xl animate-blob"></div>
  <div class="absolute bottom-0 -right-4 w-72 h-72 bg-yellow opacity-20 filter blur-3xl animate-blob animation-delay-2000"></div>

  <div class="container relative z-10">
    <h2 data-aos="fade-up" class="text-center font-header text-4xl font-semibold uppercase text-white sm:text-5xl lg:text-6xl">
      {{ 'CONTACT.TITLE' | translate }}
    </h2>
    <h4 data-aos="fade-up" data-aos-delay="100" class="pt-6 text-center font-header text-xl font-medium text-grey-10 sm:text-2xl lg:text-3xl">
      {{ 'CONTACT.SUBTITLE' | translate }}
    </h4>

    <div class="mx-auto w-full pt-10 sm:w-3/4 md:pt-12 lg:w-3/5">
      <form action="https://formspree.io/f/mgonpqlg" method="POST" 
            class="grid grid-cols-1 gap-6 sm:grid-cols-2 bg-white/10 backdrop-blur-md p-8 rounded-xl shadow-2xl border border-white/20">
        
        <div data-aos="fade-right" data-aos-delay="200">
          <label class="block font-body font-medium text-white">{{ 'CONTACT.FORM.NAME' | translate }}</label>
          <input name="name" type="text" [placeholder]="'CONTACT.FORM.NAME_PLACEHOLDER' | translate" required
            class="mt-2 w-full rounded border-none bg-white/20 px-4 py-3 font-body text-white placeholder-grey-30 shadow-inner focus:ring-2 focus:ring-yellow outline-none transition-all" />
        </div>

        <div data-aos="fade-left" data-aos-delay="200">
          <label class="block font-body font-medium text-white">{{ 'CONTACT.FORM.EMAIL' | translate }}</label>
          <input name="email" type="email" [placeholder]="'CONTACT.FORM.EMAIL_PLACEHOLDER' | translate" required
            class="mt-2 w-full rounded border-none bg-white/20 px-4 py-3 font-body text-white placeholder-grey-30 shadow-inner focus:ring-2 focus:ring-yellow outline-none transition-all" />
        </div>

        <div data-aos="fade-up" data-aos-delay="300" class="sm:col-span-2">
          <label class="block font-body font-medium text-white">{{ 'CONTACT.FORM.MESSAGE' | translate }}</label>
          <textarea name="message" rows="6" [placeholder]="'CONTACT.FORM.MESSAGE_PLACEHOLDER' | translate" required
            class="mt-2 w-full rounded border-none bg-white/20 px-4 py-3 font-body text-white placeholder-grey-30 shadow-inner focus:ring-2 focus:ring-yellow outline-none transition-all"></textarea>
        </div>

        <div data-aos="zoom-in" data-aos-delay="400" class="sm:col-span-2 text-center">
          <button type="submit"
            class="mt-6 w-full sm:w-auto rounded bg-yellow px-10 py-3 font-header text-lg font-bold uppercase text-primary transition-all hover:scale-105 hover:bg-white active:scale-95 shadow-lg">
            {{ 'CONTACT.FORM.SUBMIT' | translate }}
          </button>
        </div>
      </form>

      <div class="flex flex-col pt-16 lg:flex-row justify-between gap-6">
        
        <div class="group w-full px-8 py-10 bg-white rounded-xl shadow-lg transition-all duration-300 hover:-translate-y-3 hover:shadow-primary/30 border-b-4 border-transparent hover:border-primary text-center cursor-pointer" 
             data-aos="fade-up" data-aos-delay="500">
          <i class="bx bx-envelope text-4xl text-primary group-hover:scale-110 transition-transform"></i>
          <p class="pt-2 font-body font-bold text-grey-20">{{ 'CONTACT.INFO.EMAIL_LABEL' | translate }}</p>
          <p class="font-body text-black">danrognoni@outlook.es</p>
        </div>

        <div class="group w-full px-8 py-10 bg-white rounded-xl shadow-lg transition-all duration-300 hover:-translate-y-3 hover:shadow-primary/30 border-b-4 border-transparent hover:border-primary text-center cursor-pointer" 
             data-aos="fade-up" data-aos-delay="600">
          <i class="bx bx-map text-4xl text-primary group-hover:scale-110 transition-transform"></i>
          <p class="pt-2 font-body font-bold text-grey-20">{{ 'CONTACT.INFO.LOCATION' | translate }}</p>
          <p class="font-body text-black">{{ 'CONTACT.INFO.LOCATION_VAL' | translate }}</p>
        </div>

        <div class="group w-full px-8 py-10 bg-white rounded-xl shadow-lg transition-all duration-300 hover:-translate-y-3 hover:shadow-primary/30 border-b-4 border-transparent hover:border-primary text-center cursor-pointer" 
             data-aos="fade-up" data-aos-delay="700">
          <i class="bx bxl-linkedin-square text-4xl text-primary group-hover:scale-110 transition-transform"></i>
          <p class="pt-2 font-body font-bold text-grey-20">{{ 'CONTACT.INFO.LINKEDIN' | translate }}</p>
          <p class="font-body text-black">/in/danrognonii</p>
        </div>

      </div>
    </div>
  </div>
</div>
